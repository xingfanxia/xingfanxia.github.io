<style>
  :root{
    --bg:#0a0a0b; --fg:#f4f4f5; --muted:#8a8a92; --line:#26262b;
    --ikb:#002FA7; --ikb-bright:#1d4ed8;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--fg)}
  body{
    font-family:"Helvetica Neue",Inter,"Microsoft YaHei UI","Noto Sans SC",sans-serif;
    -webkit-font-smoothing:antialiased; line-height:1.5;
    min-height:100dvh; display:flex; flex-direction:column;
    padding:clamp(28px,6vw,88px);
  }
  .mono{font-family:ui-monospace,"SF Mono",Menlo,monospace;letter-spacing:.08em;text-transform:uppercase}
  header{margin-bottom:auto}
  .kick{font-size:12px;color:var(--muted)}
  h1{font-weight:200;font-size:clamp(40px,9vw,128px);line-height:.98;letter-spacing:-.01em;margin:.18em 0 .35em}
  h1 b{font-weight:200;color:var(--ikb-bright);font-style:italic}
  .sub{color:var(--muted);max-width:46ch;font-size:clamp(14px,1.4vw,17px)}
  main{margin:clamp(40px,8vh,96px) 0}
  .list-label{font-size:11px;color:var(--muted);border-bottom:1px solid var(--line);padding-bottom:10px;margin-bottom:8px;display:flex;justify-content:space-between}
  a.item{
    display:grid;grid-template-columns:1fr auto;align-items:baseline;gap:16px;
    text-decoration:none;color:var(--fg);border-bottom:1px solid var(--line);
    padding:22px 0;transition:padding-left .18s ease,color .18s ease;
  }
  a.item:hover{padding-left:14px;color:var(--ikb-bright)}
  a.item .t{font-size:clamp(18px,2.4vw,26px);font-weight:300}
  a.item .d{display:block;color:var(--muted);font-size:13px;font-weight:400;margin-top:6px}
  a.item:hover .d{color:var(--muted)}
  a.item .meta{font-size:11px;color:var(--muted);white-space:nowrap}
  footer{margin-top:auto;padding-top:40px;color:var(--muted);font-size:11px;display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap}
  footer a{color:var(--muted);text-decoration:none;border-bottom:1px solid var(--line)}
  footer a:hover{color:var(--fg)}
</style>
</head>
<body>
  <header>

  <footer>
